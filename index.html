<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>برای عشق زندگی‌ام ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- پس زمینه -->
<div id="sky"></div>

<!-- ستاره ها -->
<div id="stars"></div>

<!-- ماه -->
<div class="moon"></div>

<!-- محتوای اصلی -->

<main class="card">

<div id="heart">
♡
</div>

<h1 id="title">
برای تو که بهترین اتفاق زندگی منی...
</h1>

<p class="line hidden" id="line1">
قبل از باز کردن این پاکت...
</p>

<p class="line hidden" id="line2">
فقط چند دقیقه کنار من بمان...
</p>

<p class="line hidden" id="line3">
می‌خواهم این چند لحظه،
فقط برای من و تو باشه...
</p>

<button id="playButton" class="hidden">

🎵

شروع این لحظه

</button>

<section id="letterSection">

<h2>

حالا پاکت را باز کن...

</h2>

<p>

موسیقی را تا پایان نامه قطع نکن...

</p>

</section>

<div id="progressContainer">

<div id="progressBar"></div>

</div>

<div id="ending">

<h2>

دوستت دارم...

</h2>

<p>

بیشتر از آنچه کلمات بتوانند بگویند.

</p>

<div class="signature">

با تمام عشق

<br>

<strong>بابک</strong>

</div>

</div>

<audio id="music">

<source src="song.mp3" type="audio/mpeg">

</audio>

</main>

<script src="script.js"></script>

</body>

</html>
